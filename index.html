<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1a1a2e;
            color: #eee;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.8rem;
            letter-spacing: 0.05em;
            color: #f0c040;
        }

        /* Main display area for the large preview image */
        #image {
            width: 100%;
            height: 420px;
            border: 3px dashed #555;
            background-color: #2a2a3e;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: background-image 0.3s ease;
        }

        /* Caption bar inside the preview */
        #image span {
            width: 100%;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.55);
            text-align: center;
            font-size: 1rem;
            letter-spacing: 0.03em;
        }

        /* Container for thumbnail figures */
        .preview-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Each figure wraps the thumbnail */
        figure {
            margin: 0;
            padding: 0;
            outline: none;
        }

        /* Keyboard focus ring on the figure */
        figure:focus {
            outline: 3px solid #f0c040;
            outline-offset: 3px;
            border-radius: 3px;
        }

        /* Thumbnail images */
        .preview-img {
            width: 140px;
            height: 100px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            display: block;
            transition: border-color 0.2s, transform 0.15s;
        }

        .preview-img:hover {
            border-color: #f0c040;
            transform: scale(1.04);
        }

        figure:focus .preview-img {
            border-color: #f0c040;
        }

        figcaption {
            font-size: 0.75rem;
            text-align: center;
            color: #aaa;
            margin-top: 4px;
            max-width: 140px;
        }

        /* Skip-link for keyboard users */
        .skip-link {
            position: absolute;
            left: -9999px;
            top: auto;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }

        .skip-link:focus {
            position: static;
            width: auto;
            height: auto;
            padding: 6px 12px;
            background: #f0c040;
            color: #111;
            font-weight: bold;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <a class="skip-link" href="#gallery">Skip to gallery</a>

    <h1>Interactive Photo Gallery</h1>

    <!-- Main display box -->
    <div id="image" role="img" aria-live="polite" aria-label="Photo preview area">
        <span>Hover over or focus an image below to preview it here.</span>
    </div>

    <!-- Thumbnail section -->
    <div class="preview-container" id="gallery" role="list">

        <figure role="listitem"
                onmouseover="upDate(this)"
                onmouseleave="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()">
            <img class="preview-img"
                 src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=500"
                 alt="Cute Sleeping Cat">
            <figcaption>Sleeping Cat</figcaption>
        </figure>

        <figure role="listitem"
                onmouseover="upDate(this)"
                onmouseleave="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()">
            <img class="preview-img"
                 src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500"
                 alt="Sunny Summer Beach">
            <figcaption>Summer Beach</figcaption>
        </figure>

        <figure role="listitem"
                onmouseover="upDate(this)"
                onmouseleave="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()">
            <img class="preview-img"
                 src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=500"
                 alt="Deep Green Forest Path">
            <figcaption>Forest Path</figcaption>
        </figure>

        <figure role="listitem"
                onmouseover="upDate(this)"
                onmouseleave="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()">
            <img class="preview-img"
                 src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500"
                 alt="Snowy Mountain Peak at Night">
            <figcaption>Mountain at Night</figcaption>
        </figure>

        <figure role="listitem"
                onmouseover="upDate(this)"
                onmouseleave="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()">
            <img class="preview-img"
                 src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500"
                 alt="Calm Lake Reflecting Mountains">
            <figcaption>Mountain Lake</figcaption>
        </figure>

        <figure role="listitem"
                onmouseover="upDate(this)"
                onmouseleave="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()">
            <img class="preview-img"
                 src="https://images.unsplash.com/photo-1490750967868-88df5691cc43?w=500"
                 alt="Colorful Wildflower Meadow">
            <figcaption>Wildflower Meadow</figcaption>
        </figure>

    </div>

    <script src="script.js"></script>
</body>
</html>
