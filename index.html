<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>
    <style>
        /* Main display area for the large preview image */
        #image {
            width: 100%;
            height: 400px;
            border: 3px dashed #777;
            background-color: #f3f3f3;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #555;
            margin-bottom: 20px;
            font-family: sans-serif;
        }
        
        /* Container for the thumbnail images */
        .preview-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        /* Styling for the thumbnails */
        .preview-img {
            width: 150px;
            height: 100px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        
        .preview-img:hover {
            border-color: #333;
        }
    </style>
</head>
<body>

    <!-- Main display box: Text and background will change via JavaScript -->
    <div id="image">
        Hover over an image below to display here.
    </div>

    <!-- Thumbnail section: You can replace these URLs with your own images -->
    <div class="preview-container">
        <img class="preview-img" 
             src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=500" 
             alt="Cute Sleeping Cat" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview-img" 
             src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500" 
             alt="Sunny Summer Beach" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">

        <img class="preview-img" 
             src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=500" 
             alt="Deep Green Forest Path" 
             onmouseover="upDate(this)" 
             onmouseleave="unDo()">
    </div>

    <!-- Link to the external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
